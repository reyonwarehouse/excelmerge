<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Merge</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --line: #dddddd;
      --soft: #f0f0f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 180px auto auto;
      gap: 10px;
      align-items: center;
    }

    input[type="file"],
    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      background: #111;
      color: white;
      font-weight: 600;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px 0;
      font-size: 16px;
    }

    .mini-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 14px;
    }

    th {
      background: #f8f8f8;
      text-align: left;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 6px 0 0 0;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <div class="title-icon">📄</div>
        <h1>Excel Merge</h1>
      </div>
      <p class="subtitle">Upload, merge, filter and export daily order lists.</p>
    </div>

    <div class="card">
      <div class="toolbar">
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <input type="date" id="uploadDate" />
        <button id="downloadBtn" type="button">Export Excel</button>
        <button id="clearBtn" class="secondary" type="button">Clear Data</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="stats-grid">
      <div class="card">
        <h2 class="section-title"><span class="mini-icon">📅</span>Daily size totals</h2>
        <div id="dailyTableWrap"></div>
        <div class="footer-note">Shows totals for the selected upload date.</div>
      </div>

      <div class="card">
        <h2 class="section-title"><span class="mini-icon">📈</span>Month-to-date size totals</h2>
        <div id="monthlyTableWrap"></div>
        <div class="footer-note">Cumulative totals for the selected month.</div>
      </div>
    </div>
  </div>

  <script>
    let historyData = JSON.parse(localStorage.getItem("salesHistory") || "[]");
    let latestProcessedData = JSON.parse(localStorage.getItem("latestProcessedData") || "[]");

    const fileInput = document.getElementById("fileInput");
    const uploadDateInput = document.getElementById("uploadDate");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const dailyTableWrap = document.getElementById("dailyTableWrap");
    const monthlyTableWrap = document.getElementById("monthlyTableWrap");

    const today = new Date().toISOString().slice(0, 10);
    uploadDateInput.value = today;

    fileInput.addEventListener("change", handleFile);
    downloadBtn.addEventListener("click", downloadExcel);
    clearBtn.addEventListener("click", clearData);
    uploadDateInput.addEventListener("change", renderDashboard);

    function normalizeSku(value) {
      return String(value || "").trim();
    }

    function extractSize(sku) {
      const match = sku.match(/(\d+)\s*x\s*(\d+)/i);
      if (!match) return null;

      return {
        text: `${Number(match[1])}x${Number(match[2])}`,
        w: Number(match[1]),
        h: Number(match[2])
      };
    }

    function isAllowedSize(sizeObj) {
      if (!sizeObj) return false;
      if (sizeObj.w > 5) return true;
      if (sizeObj.w === 5 && sizeObj.h >= 7) return true;
      return false;
    }

    function compareSizeText(a, b) {
      const sa = extractSize(a);
      const sb = extractSize(b);

      if (!sa && !sb) return 0;
      if (!sa) return 1;
      if (!sb) return -1;

      return sa.w - sb.w || sa.h - sb.h;
    }

    function buildSizeTotals(records) {
      const totals = {};

      records.forEach(item => {
        if (!item.size) return;
        totals[item.size] = (totals[item.size] || 0) + item.quantity;
      });

      return Object.entries(totals)
        .sort((a, b) => compareSizeText(a[0], b[0]))
        .map(([size, quantity]) => ({ size, quantity }));
    }

    function renderSimpleTable(container, rows, leftHeader, rightHeader) {
      if (!rows.length) {
        container.innerHTML = '<div class="empty">No data</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>${leftHeader}</th>
              <th style="text-align:center;">${rightHeader}</th>
            </tr>
          </thead>
          <tbody>
      `;

      rows.forEach(row => {
        html += `
          <tr>
            <td>${row.size}</td>
            <td style="text-align:center;">${row.quantity}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const selectedDate = uploadDateInput.value || today;
      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const workbook = XLSX.read(e.target.result, { type: "binary" });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
          processData(rows, selectedDate);
        } catch (error) {
          console.error(error);
          statusEl.textContent = "Could not read the file.";
        }
      };

      reader.readAsBinaryString(file);
    }

    function processData(rows, uploadDate) {
      const map = {};
      let keptRows = 0;
      let skippedRows = 0;

      rows.forEach((row) => {
        const values = Object.values(row);
        const skuRaw = normalizeSku(row.SKU || row.sku || values[0]);
        const qtyRaw = row.Quantity || row.quantity || values[1];
        const quantity = Number(qtyRaw);

        if (!skuRaw || !Number.isFinite(quantity) || quantity <= 0) {
          skippedRows++;
          return;
        }

        const sizeObj = extractSize(skuRaw);

        if (!isAllowedSize(sizeObj)) {
          skippedRows++;
          return;
        }

        const sizeText = sizeObj.text;
        const key = skuRaw;

        if (!map[key]) {
          map[key] = {
            sku: skuRaw,
            size: sizeText,
            quantity: 0
          };
        }

        map[key].quantity += quantity;
        keptRows++;
      });

      latestProcessedData = Object.values(map)
        .sort((a, b) => compareSizeText(a.size, b.size) || a.sku.localeCompare(b.sku));

      latestProcessedData.forEach(item => {
        const existing = historyData.find(
          h => h.uploadDate === uploadDate && h.sku === item.sku
        );

        if (existing) {
          existing.quantity += item.quantity;
        } else {
          historyData.push({
            sku: item.sku,
            size: item.size,
            quantity: item.quantity,
            uploadDate
          });
        }
      });

      localStorage.setItem("salesHistory", JSON.stringify(historyData));
      localStorage.setItem("latestProcessedData", JSON.stringify(latestProcessedData));

      statusEl.textContent =
        `${keptRows} rows saved, ${skippedRows} rows skipped. Sizes below 5x7 were ignored.`;

      renderDashboard();
    }

    function renderDashboard() {
      const selectedDate = uploadDateInput.value || today;
      const monthPrefix = selectedDate.slice(0, 7);

      const dailyRows = historyData.filter(item => item.uploadDate === selectedDate);
      const monthlyRows = historyData.filter(item => item.uploadDate.startsWith(monthPrefix));

      const dailyTotals = buildSizeTotals(dailyRows);
      const monthlyTotals = buildSizeTotals(monthlyRows);

      renderSimpleTable(dailyTableWrap, dailyTotals, "SIZE", "QUANTITY");
      renderSimpleTable(monthlyTableWrap, monthlyTotals, "SIZE", "QUANTITY");
    }

    async function downloadExcel() {
      if (!latestProcessedData.length) {
        statusEl.textContent = "No processed data to export.";
        return;
      }

      const workbook = new ExcelJS.Workbook();
      const worksheet = workbook.addWorksheet("Sales");

      const longestSkuLength = Math.max(
        3,
        ...latestProcessedData.map(item => String(item.sku || "").length)
      );

      worksheet.columns = [
        { header: "SKU", key: "sku", width: longestSkuLength + 3 },
        { header: "QUANTITY", key: "quantity", width: 14 }
      ];

      latestProcessedData.forEach(item => {
        worksheet.addRow({
          sku: item.sku,
          quantity: item.quantity
        });
      });

      worksheet.eachRow((row, rowNumber) => {
        row.height = 20;

        row.eachCell((cell, colNumber) => {
          cell.border = {
            top: { style: "thin" },
            left: { style: "thin" },
            bottom: { style: "thin" },
            right: { style: "thin" }
          };

          cell.font = {
            name: "Arial",
            size: 11,
            bold: rowNumber === 1
          };

          if (rowNumber === 1) {
            cell.alignment = {
              vertical: "middle",
              horizontal: "center"
            };
          } else {
            cell.alignment = {
              vertical: "middle",
              horizontal: colNumber === 1 ? "left" : "center"
            };
          }
        });
      });

      const buffer = await workbook.xlsx.writeBuffer();
      saveAs(
        new Blob([buffer], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        }),
        "excel_merge_output.xlsx"
      );

      statusEl.textContent = "Excel file exported.";
    }

    function clearData() {
      localStorage.removeItem("salesHistory");
      localStorage.removeItem("latestProcessedData");
      historyData = [];
      latestProcessedData = [];
      renderDashboard();
      statusEl.textContent = "All data cleared.";
    }

    renderDashboard();
  </script>
</body>
</html>
