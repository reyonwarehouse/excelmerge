```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Excel Merge</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1100px;
  margin: auto;
}
h1 {
  margin-bottom: 5px;
}
.subtitle {
  color: #666;
  margin-bottom: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 20px;
}
.toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.kpi {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.kpi div {
  flex: 1;
  min-width: 180px;
  text-align: center;
}
.kpi h2 {
  margin: 0;
}
button {
  padding: 10px 15px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: black;
  color: white;
}
button.secondary {
  background: #ccc;
  color: black;
}

  width: 100%;
  border-collapse: collapse;
}

  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
}
#status {
  margin-top: 12px;
  color: #333;
}
</style>
</head>
<body>
<div class="container">

  <h1>Excel Merge</h1>
  <div class="subtitle">Excel siparişlerini birleştir, analiz et, indir</div>

  <div class="card">
    <div class="toolbar">
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
      <button onclick="downloadExcel()">Excel İndir</button>
      <button class="secondary" onclick="clearData()">Temizle</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card kpi">
    <div>
      <h3>Toplam Satış</h3>
      <h2 id="totalSales">0</h2>
    </div>
    <div>
      <h3>Farklı SKU</h3>
      <h2 id="totalSku">0</h2>
    </div>
    <div>
      <h3>Farklı Size</h3>
      <h2 id="totalSize">0</h2>
    </div>
  </div>

  <div class="card">
    <h3>Top SKU</h3>
    <table id="skuTable"></table>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("salesData") || "[]");
document.getElementById("fileInput").addEventListener("change", handleFile);

function normalizeSku(value) {
  return String(value || "").trim();
}

function extractSize(sku) {
  const match = sku.match(/(\d+)\s*x\s*(\d+)/i);
  if (!match) return null;
  return {
    text: `${Number(match[1])}x${Number(match[2])}`,
    w: Number(match[1]),
    h: Number(match[2])
  };
}

function isAllowedSize(sizeObj) {
  if (!sizeObj) return false;
  if (sizeObj.w > 5) return true;
  if (sizeObj.w === 5 && sizeObj.h >= 7) return true;
  return false;
}

function sizeSortText(a, b) {
  const sa = extractSize(a.size || "");
  const sb = extractSize(b.size || "");
  if (!sa && !sb) return 0;
  if (!sa) return 1;
  if (!sb) return -1;
  return sa.w - sb.w || sa.h - sb.h;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(evt) {
    const wb = XLSX.read(evt.target.result, { type: "binary" });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
    processData(json);
  };

  reader.readAsBinaryString(file);
}

function processData(rows) {
  const map = {};
  let keptRows = 0;
  let skippedRows = 0;

  rows.forEach((r) => {
    const values = Object.values(r);
    const skuRaw = normalizeSku(r.SKU || r.sku || values[0]);
    const qtyRaw = r.Quantity || r.quantity || values[1];
    const qty = Number(qtyRaw);

    if (!skuRaw || !Number.isFinite(qty) || qty <= 0) {
      skippedRows++;
      return;
    }

    const sizeObj = extractSize(skuRaw);

    // 5x7'den küçük olanları alma
    if (!isAllowedSize(sizeObj)) {
      skippedRows++;
      return;
    }

    const sizeText = sizeObj.text;

    // SKU aynen korunuyor, size ayrıca analiz için tutuluyor
    const key = skuRaw;

    if (!map[key]) {
      map[key] = {
        sku: skuRaw,
        size: sizeText,
        quantity: 0
      };
    }

    map[key].quantity += qty;
    keptRows++;
  });

  const newData = Object.values(map);

  // Eski verilerle birleştir
  newData.forEach((item) => {
    const existing = data.find(d => d.sku === item.sku);
    if (existing) {
      existing.quantity += item.quantity;
    } else {
      data.push(item);
    }
  });

  localStorage.setItem("salesData", JSON.stringify(data));
  render();

  document.getElementById("status").innerText =
    `${keptRows} satır alındı, ${skippedRows} satır atlandı. 5x7'den küçük ölçüler kaydedilmedi.`;
}

function render() {
  const total = data.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById("totalSales").innerText = total;
  document.getElementById("totalSku").innerText = data.length;

  const sizes = [...new Set(data.map(d => d.size).filter(Boolean))];
  document.getElementById("totalSize").innerText = sizes.length;

  const sorted = [...data]
    .sort((a, b) => b.quantity - a.quantity)
    .slice(0, 10);

  let html = "<tr><th>SKU</th><th>Size</th><th>Adet</th></tr>";
  sorted.forEach(d => {
    html += `
      <tr>
        <td>${d.sku}</td>
        <td>${d.size || ""}</td>
        <td>${d.quantity}</td>
      </tr>
    `;
  });

  document.getElementById("skuTable").innerHTML = html;
}

function downloadExcel() {
  const exportData = [...data]
    .sort((a, b) => sizeSortText(a, b))
    .map(item => ({
      sku: item.sku,         // SKU tam haliyle kalıyor
      size: item.size,
      quantity: item.quantity
    }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales");
  XLSX.writeFile(wb, "excel_merge_output.xlsx");
}

function clearData() {
  localStorage.removeItem("salesData");
  data = [];
  render();
  document.getElementById("status").innerText = "Veri temizlendi";
}

render();
</script>
</body>
</html>
