<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel SKU Birleştirici</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2b2b2b;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }
    .upload-area {
      width: min(520px, calc(100vw - 40px));
      border: 2px dashed #6d6d6d;
      border-radius: 18px;
      padding: 48px 24px;
      text-align: center;
      background: #232323;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .upload-area:hover {
      border-color: #a0a0a0;
      transform: translateY(-1px);
    }
    .upload-area h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    .upload-area p {
      margin: 0;
      color: #cfcfcf;
      font-size: 15px;
      line-height: 1.5;
    }
    input[type="file"] {
      display: none;
    }
    .status {
      margin-top: 18px;
      color: #d8d8d8;
      font-size: 14px;
      min-height: 20px;
    }
    .error {
      margin-top: 10px;
      color: #ff8f8f;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <label class="upload-area" for="fileInput">
    <h1>Excel Dosyalarını Yükle</h1>
    <p>Bir veya birden fazla Excel dosyası seç.<br>Yükleme biter bitmez aynı SKU'lar birleştirilir ve dosya otomatik indirilir.</p>
    <div class="status" id="status">Hazır</div>
    <div class="error" id="error"></div>
  </label>

  <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" multiple />

  <script>
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setError(text) {
      errorEl.textContent = text || '';
    }

    function normalizeHeader(value) {
      return String(value || '')
        .trim()
        .toUpperCase()
        .replace(/\s+/g, ' ');
    }

    function findColumn(headers, targets) {
      const normalizedHeaders = headers.map(normalizeHeader);
      for (const target of targets) {
        const index = normalizedHeaders.indexOf(normalizeHeader(target));
        if (index !== -1) return headers[index];
      }
      return null;
    }

    function toNumber(value) {
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      const cleaned = String(value || '').replace(/,/g, '').trim();
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    async function readExcelFiles(files) {
      const allRows = [];

      for (const file of files) {
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array' });
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        const json = XLSX.utils.sheet_to_json(worksheet, {
          defval: '',
          raw: false,
        });
        allRows.push(...json);
      }

      return allRows;
    }

    function mergeRows(allRows) {
      if (!allRows.length) throw new Error('Dosyalarda veri bulunamadı.');

      const headers = Object.keys(allRows[0] || {});
      const skuColumn = findColumn(headers, ['SKU', 'STOCK KEEPING UNIT', 'ITEM SKU', 'PRODUCT SKU']);
      const qtyColumn = findColumn(headers, ['QTY', 'QUANTITY', 'ADET', 'MIKTAR', 'MİKTAR']);

      if (!skuColumn || !qtyColumn) {
        throw new Error('SKU ve QTY kolonları bulunamadı.');
      }

      const grouped = new Map();

      for (const row of allRows) {
        const sku = String(row[skuColumn] || '').trim();
        if (!sku) continue;

        const qty = toNumber(row[qtyColumn]);

        if (!grouped.has(sku)) {
          grouped.set(sku, { SKU: sku, QTY: qty });
        } else {
          grouped.get(sku).QTY += qty;
        }
      }

      return Array.from(grouped.values()).sort((a, b) => String(a.SKU).localeCompare(String(b.SKU)));
    }

    function downloadMergedExcel(rows) {
      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Merged');
      XLSX.writeFile(workbook, 'merged_sku_qty.xlsx');
    }

    async function handleFiles(files) {
      if (!files.length) return;

      setError('');
      setStatus('Dosyalar işleniyor...');

      try {
        const allRows = await readExcelFiles(files);
        const mergedRows = mergeRows(allRows);
        setStatus('İndirme başlatılıyor...');
        downloadMergedExcel(mergedRows);
        setStatus('Tamamlandı. Yeni dosya indirildi.');
      } catch (error) {
        setStatus('Hata');
        setError(error.message || 'Bir hata oluştu.');
      } finally {
        fileInput.value = '';
      }
    }

    fileInput.addEventListener('change', (e) => {
      handleFiles(Array.from(e.target.files || []));
    });
  </script>
</body>
</html>
