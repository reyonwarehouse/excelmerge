<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Excel Merge</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  margin-bottom: 5px;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 20px;
}

.kpi {
  display: flex;
  gap: 20px;
}

.kpi div {
  flex: 1;
  text-align: center;
}

.kpi h2 {
  margin: 0;
}

button {
  padding: 10px 15px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: black;
  color: white;
}

button.secondary {
  background: #ccc;
  color: black;
}

input {
  margin-right: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>
<div class="container">

<h1>Excel Merge</h1>
<div class="subtitle">Excel siparişlerini birleştir, analiz et, indir</div>

<div class="card">
<input type="file" id="fileInput">
<button onclick="downloadExcel()">Excel İndir</button>
<button class="secondary" onclick="clearData()">Temizle</button>
<p id="status"></p>
</div>

<div class="card kpi">
<div>
<h3>Toplam Satış</h3>
<h2 id="totalSales">0</h2>
</div>
<div>
<h3>Farklı SKU</h3>
<h2 id="totalSku">0</h2>
</div>
<div>
<h3>Farklı Size</h3>
<h2 id="totalSize">0</h2>
</div>
</div>

<div class="card">
<h3>Top SKU</h3>
<table id="skuTable"></table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("salesData") || "[]");

document.getElementById("fileInput").addEventListener("change", handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt) {
    const wb = XLSX.read(evt.target.result, {type: "binary"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processData(json);
    document.getElementById("status").innerText = json.length + " satır işlendi";
  };

  reader.readAsBinaryString(file);
}

function parseSKU(sku) {
  const match = sku.match(/(\d+)x(\d+)/i);

  if (!match) return { clean: sku, size: null };

  return {
    clean: sku.replace(match[0], "").replace(/--/g,"").trim(),
    size: match[1] + "x" + match[2]
  };
}

function sizeSort(a, b) {
  if (!a.size) return 1;
  if (!b.size) return -1;

  let [a1, a2] = a.size.split("x").map(Number);
  let [b1, b2] = b.size.split("x").map(Number);

  return a1 - b1 || a2 - b2;
}

function processData(rows) {
  let map = {};

  rows.forEach(r => {
    let skuRaw = r.SKU || r.sku || Object.values(r)[0];
    let qty = Number(r.Quantity || r.quantity || Object.values(r)[1]);

    let parsed = parseSKU(skuRaw);
    let key = parsed.clean + "_" + parsed.size;

    if (!map[key]) {
      map[key] = {
        sku: parsed.clean,
        size: parsed.size,
        quantity: 0
      };
    }

    map[key].quantity += qty;
  });

  let newData = Object.values(map);

  // eski data ile merge (duplicate önleme)
  newData.forEach(n => {
    let existing = data.find(d => d.sku === n.sku && d.size === n.size);
    if (existing) {
      existing.quantity += n.quantity;
    } else {
      data.push(n);
    }
  });

  localStorage.setItem("salesData", JSON.stringify(data));
  render();
}

function render() {
  let total = data.reduce((a,b)=>a+b.quantity,0);
  document.getElementById("totalSales").innerText = total;
  document.getElementById("totalSku").innerText = data.length;

  let sizes = [...new Set(data.map(d=>d.size))];
  document.getElementById("totalSize").innerText = sizes.length;

  let sorted = [...data]
    .sort((a,b)=>b.quantity-a.quantity)
    .slice(0,10);

  let html = "<tr><th>SKU</th><th>Size</th><th>Adet</th></tr>";

  sorted.forEach(d=>{
    html += `<tr>
      <td>${d.sku}</td>
      <td>${d.size || ""}</td>
      <td>${d.quantity}</td>
    </tr>`;
  });

  document.getElementById("skuTable").innerHTML = html;
}

function downloadExcel() {
  let sorted = [...data].sort(sizeSort);

  const ws = XLSX.utils.json_to_sheet(sorted);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales");

  XLSX.writeFile(wb, "excel_merge_output.xlsx");
}

function clearData() {
  localStorage.removeItem("salesData");
  data = [];
  render();
  document.getElementById("status").innerText = "Veri temizlendi";
}

render();
</script>

</body>
</html>
