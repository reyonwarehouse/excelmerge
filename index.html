<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Merge</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px 0;
    }

    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #d9d9d9;
      color: #111;
    }

    #status {
      margin-top: 12px;
      color: #333;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .kpi-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .kpi-box h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #666;
      font-weight: 600;
    }

    .kpi-box h2 {
      margin: 0;
      font-size: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #e5e5e5;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    @media (max-width: 768px) {
      .kpi {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Excel Merge</h1>
    <div class="subtitle">Excel siparişlerini birleştir, analiz et, indir</div>

    <div class="card">
      <div class="toolbar">
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <button id="downloadBtn" type="button">Excel İndir</button>
        <button class="secondary" id="clearBtn" type="button">Temizle</button>
      </div>
      <div id="status"></div>
    </div>

    <div class="kpi">
      <div class="kpi-box">
        <h3>Toplam Satış</h3>
        <h2 id="totalSales">0</h2>
      </div>
      <div class="kpi-box">
        <h3>Farklı SKU</h3>
        <h2 id="totalSku">0</h2>
      </div>
      <div class="kpi-box">
        <h3>Farklı Size</h3>
        <h2 id="totalSize">0</h2>
      </div>
    </div>

    <div class="card">
      <h3>Top SKU</h3>
      <table id="skuTable">
        <thead>
          <tr>
            <th>SKU</th>
            <th>Size</th>
            <th>Quantity</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem("salesData") || "[]");

    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");
    const totalSalesEl = document.getElementById("totalSales");
    const totalSkuEl = document.getElementById("totalSku");
    const totalSizeEl = document.getElementById("totalSize");
    const skuTableBody = document.querySelector("#skuTable tbody");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");

    fileInput.addEventListener("change", handleFile);
    downloadBtn.addEventListener("click", downloadExcel);
    clearBtn.addEventListener("click", clearData);

    function normalizeSku(value) {
      return String(value || "").trim();
    }

    function extractSize(sku) {
      const match = sku.match(/(\d+)\s*x\s*(\d+)/i);
      if (!match) return null;

      return {
        text: Number(match[1]) + "x" + Number(match[2]),
        w: Number(match[1]),
        h: Number(match[2])
      };
    }

    function isAllowedSize(sizeObj) {
      if (!sizeObj) return false;
      if (sizeObj.w > 5) return true;
      if (sizeObj.w === 5 && sizeObj.h >= 7) return true;
      return false;
    }

    function sizeSortText(a, b) {
      const sa = extractSize(a.size || "");
      const sb = extractSize(b.size || "");

      if (!sa && !sb) return 0;
      if (!sa) return 1;
      if (!sb) return -1;

      return sa.w - sb.w || sa.h - sb.h;
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const workbook = XLSX.read(e.target.result, { type: "binary" });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
          processData(rows);
        } catch (error) {
          console.error(error);
          statusEl.textContent = "Dosya okunurken hata oluştu.";
        }
      };

      reader.readAsBinaryString(file);
    }

    function processData(rows) {
      const map = {};
      let keptRows = 0;
      let skippedRows = 0;

      rows.forEach((row) => {
        const values = Object.values(row);
        const skuRaw = normalizeSku(row.SKU || row.sku || values[0]);
        const qtyRaw = row.Quantity || row.quantity || values[1];
        const quantity = Number(qtyRaw);

        if (!skuRaw || !Number.isFinite(quantity) || quantity <= 0) {
          skippedRows++;
          return;
        }

        const sizeObj = extractSize(skuRaw);

        if (!isAllowedSize(sizeObj)) {
          skippedRows++;
          return;
        }

        const sizeText = sizeObj.text;
        const key = skuRaw;

        if (!map[key]) {
          map[key] = {
            sku: skuRaw,
            size: sizeText,
            quantity: 0
          };
        }

        map[key].quantity += quantity;
        keptRows++;
      });

      const newData = Object.values(map);

      newData.forEach((item) => {
        const existing = data.find(d => d.sku === item.sku);
        if (existing) {
          existing.quantity += item.quantity;
        } else {
          data.push(item);
        }
      });

      localStorage.setItem("salesData", JSON.stringify(data));
      render();

      statusEl.textContent = keptRows + " satır alındı, " + skippedRows + " satır atlandı. 5x7'den küçük ölçüler kaydedilmedi.";
    }

    function render() {
      const totalSales = data.reduce((sum, item) => sum + item.quantity, 0);
      const sizes = [...new Set(data.map(d => d.size).filter(Boolean))];

      totalSalesEl.textContent = totalSales;
      totalSkuEl.textContent = data.length;
      totalSizeEl.textContent = sizes.length;

      const sorted = [...data].sort((a, b) => b.quantity - a.quantity).slice(0, 50);

      skuTableBody.innerHTML = "";

      if (sorted.length === 0) {
        skuTableBody.innerHTML = '<tr><td colspan="3">Veri yok</td></tr>';
        return;
      }

      sorted.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.sku}</td>
          <td>${item.size || ""}</td>
          <td>${item.quantity}</td>
        `;
        skuTableBody.appendChild(tr);
      });
    }

    function downloadExcel() {
      if (!data.length) {
        statusEl.textContent = "İndirilecek veri yok.";
        return;
      }

      const exportData = [...data]
        .sort((a, b) => sizeSortText(a, b))
        .map(item => ({
          SKU: item.sku,
          QUANTITY: item.quantity
        }));

      const ws = XLSX.utils.json_to_sheet(exportData, {
        header: ["SKU", "QUANTITY"]
      });

      ws["!cols"] = [
        { wch: 32 },
        { wch: 14 }
      ];

      const rowCount = exportData.length + 1;
      ws["!rows"] = Array.from({ length: rowCount }, () => ({ hpx: 20 }));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Sales");
      XLSX.writeFile(wb, "excel_merge_output.xlsx");

      statusEl.textContent = "Excel dosyası indirildi.";
    }

    function clearData() {
      localStorage.removeItem("salesData");
      data = [];
      render();
      statusEl.textContent = "Veri temizlendi.";
    }

    render();
  </script>
</body>
</html>
